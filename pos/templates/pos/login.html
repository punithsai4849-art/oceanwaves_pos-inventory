{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — Ocean Waves Sea Foods</title>
<link rel="stylesheet" href="{% static 'pos/css/style.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="login-page">
  <div class="login-ocean">
    <div class="wave w1"></div><div class="wave w2"></div><div class="wave w3"></div>
  </div>
  <div class="login-wrap">
    <div class="login-card">
      <img src="{% static 'pos/images/logo.jpg' %}" alt="Logo" class="login-logo">
      <h1>Ocean Waves Sea Foods</h1>
      <p class="login-tagline">Multi-Store Point of Sale System</p>
      {% if messages %}{% for m in messages %}
      <div class="login-error"><i class="fas fa-exclamation-circle"></i> {{ m }}</div>
      {% endfor %}{% endif %}
      <form method="POST">
        {% csrf_token %}
        <div class="lf-group">
          <i class="fas fa-user"></i>
          <input type="text" name="username" placeholder="Username" required autofocus>
        </div>
        <div class="lf-group">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      </form>
      <div style="margin-top: 15px; text-align: center;">
        <a href="{% url 'forgot_password' %}" style="color: #27a4d1; font-weight: 500; font-size: 13px; text-decoration: none;">
          <i class="fas fa-key"></i> Forgot Password?
        </a>
      </div>
      <p class="login-foot">🐟 Fresh Seafood · Fast Billing · Smart Business</p>
    </div>
  </div>
</body>
</html>
