{% extends 'pos/base.html' %}
{% block title %}Add External Credit — Ocean Waves{% endblock %}

{% block content %}
<div class="pg">
  <div class="pg-header">
    <div>
      <h1><i class="fas fa-plus-circle"></i> Add External Credit</h1>
      <p>Log a credit extended outside the POS system</p>
    </div>
    <a href="{% url 'credits_list' %}" class="btn-secondary" style="text-decoration:none;">
      <i class="fas fa-arrow-left"></i> Back to Credits
    </a>
  </div>

  <div class="form-card" style="max-width:600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    <form method="POST" action="{% url 'credit_add_external' %}">
      {% csrf_token %}
      
      <div class="fg" style="margin-bottom: 20px;">
        <label style="display:block; margin-bottom:8px; font-weight:bold; color:#1e293b;">Select Wholesale Customer *</label>
        <select name="customer" required style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px;">
          <option value="">-- Choose Customer --</option>
          {% for c in customers %}
          <option value="{{ c.id }}">{{ c.name }} ({{ c.phone }})</option>
          {% endfor %}
        </select>
      </div>

      <div class="frow" style="display:flex; gap:15px; margin-bottom: 20px;">
        <div class="fg" style="flex:1;">
          <label style="display:block; margin-bottom:8px; font-weight:bold; color:#1e293b;">Amount *</label>
          <input type="number" step="0.01" name="amount" required style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px;" placeholder="e.g. 5000.00">
        </div>
        <div class="fg" style="flex:1;">
          <label style="display:block; margin-bottom:8px; font-weight:bold; color:#1e293b;">Due Date *</label>
          <input type="date" name="due_date" required style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px;">
        </div>
      </div>

      <div class="fg" style="margin-bottom: 30px;">
        <label style="display:block; margin-bottom:8px; font-weight:bold; color:#1e293b;">External Reference / Notes</label>
        <input type="text" name="reference" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px;" placeholder="e.g. Direct transfer, agreed verbally...">
      </div>

      <div style="display:flex; justify-content: flex-end;">
        <button type="submit" class="btn-primary" style="padding: 12px 24px; font-size: 16px;">
          <i class="fas fa-save"></i> Save Credit
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
