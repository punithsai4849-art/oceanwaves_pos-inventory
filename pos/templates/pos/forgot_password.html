{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password — Ocean Waves POS</title>
<link rel="stylesheet" href="{% static 'pos/css/style.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="login-page">
  <div class="login-ocean">
    <div class="wave w1"></div><div class="wave w2"></div><div class="wave w3"></div>
  </div>
  <div class="login-wrap">
    <div class="login-card">
      <img src="{% static 'pos/images/logo.jpg' %}" alt="Logo" class="login-logo">
      <h1>Password Recovery</h1>
      <p class="login-tagline">Enter your registered email address</p>
      
      {% if messages %}{% for m in messages %}
      <div class="login-error" style="{% if 'success' in m.tags %}color:#16a34a;background:#dcfce7;border-color:#bbf7d0;{% elif 'info' in m.tags %}color:#2563eb;background:#dbeafe;border-color:#bfdbfe;{% endif %}"><i class="fas fa-info-circle"></i> {{ m }}</div>
      {% endfor %}{% endif %}
      
      <form method="POST">
        {% csrf_token %}
        <div class="lf-group">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" placeholder="Email Address" required autofocus>
        </div>
        <button type="submit" class="login-btn"><i class="fas fa-paper-plane"></i> Send OTP</button>
      </form>
      <div style="margin-top: 15px; text-align: center;">
        <a href="{% url 'login' %}" style="color: #64748b; font-size: 13px; text-decoration: none;">
          <i class="fas fa-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>
  </div>
</body>
</html>
